<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoVid - Tabel Videos List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-md w-full bg-gray-800 rounded-xl p-5 shadow-2xl border border-gray-700">
        <div class="text-center mb-5">
            <h1 class="text-2xl font-extrabold text-blue-500 tracking-wide">GoVid Multi</h1>
            <p class="text-gray-400 text-xs mt-1">Menggunakan tabel videos_list</p>
        </div>

        <div class="space-y-4 mb-5">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Nama Folder / Judul Koleksi</label>
                <input type="text" id="folder-title" placeholder="Contoh: Koleksi Film Pendek" 
                    class="w-full bg-gray-700 text-sm text-gray-100 p-3 rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500">
            </div>
            
            <div class="border-t border-gray-700 pt-3">
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Daftar Link Video</label>
                
                <div id="video-inputs-container" class="space-y-2">
                    <div class="flex gap-2 video-input-row">
                        <input type="url" placeholder="https://domain.com/video1.mp4" 
                            class="w-full bg-gray-700 text-sm text-gray-100 p-2.5 rounded-lg border border-gray-600 focus:outline-none url-input">
                    </div>
                </div>
                
                <button type="button" id="add-more-btn" class="mt-2 text-xs font-bold text-blue-400 hover:text-blue-300 py-1 px-2 rounded bg-gray-700/50">
                    ➕ Tambah Video Lagi
                </button>
            </div>
        </div>

        <button id="save-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg">
            Generate Multi Link
        </button>

        <div id="status-container" class="mt-4 hidden bg-gray-950 p-4 rounded-lg border border-gray-700">
            <p id="status-text" class="text-sm font-medium text-yellow-400 animate-pulse"></p>
            <div id="result-link" class="mt-3 hidden">
                <p class="text-xs text-gray-400 mb-1">Link Share Folder Anda:</p>
                <div class="flex gap-2">
                    <input type="text" id="share-url" readonly class="w-full bg-gray-800 text-xs text-blue-400 p-2 rounded border border-gray-600 focus:outline-none">
                    <button onclick="copyLink()" class="bg-gray-700 text-xs px-3 py-2 rounded font-semibold text-white">Salin</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ehhrvswzhirrnrqxmxae.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaHJ2c3d6aGlycm5ycXhteGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg2NDcsImV4cCI6MjA5NTgwNDY0N30.75vZs3Rn6j7YSlInHpGDN39OGjhywcEBv8j-hawyOlY";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const folderTitleInput = document.getElementById('folder-title');
        const videoInputsContainer = document.getElementById('video-inputs-container');
        const addMoreBtn = document.getElementById('add-more-btn');
        const saveBtn = document.getElementById('save-btn');
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');
        const resultLink = document.getElementById('result-link');
        const shareUrlInput = document.getElementById('share-url');

        addMoreBtn.addEventListener('click', () => {
            const newRow = document.createElement('div');
            newRow.className = 'flex gap-2 video-input-row';
            newRow.innerHTML = `
                <input type="url" placeholder="https://domain.com/video-lain.mp4" class="w-full bg-gray-700 text-sm text-gray-100 p-2.5 rounded-lg border border-gray-600 url-input">
                <button type="button" class="bg-red-900 text-red-200 px-3 rounded-lg text-xs" onclick="this.parentElement.remove()">Hapus</button>
            `;
            videoInputsContainer.appendChild(newRow);
        });

        function makeRandomSlug(length) {
            let result = '';
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return result;
        }

        saveBtn.addEventListener('click', async () => {
            const folderTitle = folderTitleInput.value.trim();
            const inputElements = document.querySelectorAll('.url-input');
            const videoUrls = Array.from(inputElements).map(input => input.value.trim()).filter(url => url !== "");

            if (!folderTitle) return alert('Nama folder/judul tidak boleh kosong!');
            if (videoUrls.length === 0) return alert('Isi minimal satu link video!');

            saveBtn.disabled = true;
            statusContainer.classList.remove('hidden');
            resultLink.classList.add('hidden');
            statusText.textContent = "Menyimpan ke tabel videos_list...";

            try {
                const randomSlug = makeRandomSlug(6);

                // Mengirim ke tabel 'videos_list'
                // Kolom video_urls menerima data berbentuk Array dari javascript []
                const { error } = await supabase
                    .from('videos_list')
                    .insert([{ 
                        title: folderTitle, 
                        slug: randomSlug, 
                        video_urls: videoUrls 
                    }]);

                if (error) {
                    alert("Supabase Error:\n" + error.message);
                    throw error;
                }

                statusText.textContent = "✓ Link Berhasil Dibuat!";
                shareUrlInput.value = `${window.location.origin}/${randomSlug}`;
                resultLink.classList.remove('hidden');

            } catch (error) {
                statusText.textContent = "❌ Gagal menyimpan.";
            } finally {
                saveBtn.disabled = false;
            }
        });

        function copyLink() {
            shareUrlInput.select();
            shareUrlInput.setSelectionRange(0, 99999);
            document.execCommand('copy');
            alert('Link berhasil disalin!');
        }
    </script>
</body>
</html>
