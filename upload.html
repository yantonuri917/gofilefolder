<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoVid - Multi Video Link Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-md w-full bg-gray-800 rounded-xl p-6 shadow-2xl border border-gray-700">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-blue-500 tracking-wide">GoVid</h1>
            <p class="text-gray-400 text-sm mt-1">Bagikan banyak link video sekaligus dalam satu slug</p>
        </div>

        <div class="space-y-4 mb-6">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Nama Folder / Judul Koleksi</label>
                <input type="text" id="folder-title" placeholder="Contoh: Koleksi Kelas Mewarnai" 
                    class="w-full bg-gray-700 text-sm text-gray-100 p-3 rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500 transition-colors">
            </div>
            
            <div class="border-t border-gray-700 pt-4">
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Daftar Link Video</label>
                <div id="video-inputs-container" class="space-y-3">
                    <div class="flex gap-2 video-input-row">
                        <input type="url" placeholder="https://domain.com/video1.mp4" 
                            class="w-full bg-gray-700 text-sm text-gray-100 p-2.5 rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500 transition-colors url-input">
                    </div>
                </div>
                
                <button type="button" id="add-more-btn" class="mt-3 text-xs font-bold text-blue-400 hover:text-blue-300 transition-colors flex items-center gap-1">
                    ➕ Tambah Video Lagi
                </button>
            </div>
        </div>

        <button id="save-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-lg disabled:bg-gray-600">
            Generate Multi Link
        </button>

        <div id="status-container" class="mt-6 hidden bg-gray-950 p-4 rounded-lg border border-gray-700">
            <p id="status-text" class="text-sm font-medium text-yellow-400 animate-pulse"></p>
            <div id="result-link" class="mt-3 hidden">
                <p class="text-xs text-gray-400 mb-1">Link Share Folder Anda:</p>
                <div class="flex gap-2">
                    <input type="text" id="share-url" readonly class="w-full bg-gray-800 text-xs text-blue-400 p-2 rounded border border-gray-600 focus:outline-none">
                    <button onclick="copyLink()" class="bg-gray-700 hover:bg-gray-600 text-xs px-3 py-2 rounded font-semibold text-white">Salin</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ehhrvswzhirrnrqxmxae.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaHJ2c3d6aGlycm5ycXhteGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg2NDcsImV4cCI6MjA5NTgwNDY0N30.75vZs3Rn6j7YSlInHpGDN39OGjhywcEBv8j-hawyOlY";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const folderTitleInput = document.getElementById('folder-title');
        const videoInputsContainer = document.getElementById('video-inputs-container');
        const addMoreBtn = document.getElementById('add-more-btn');
        const saveBtn = document.getElementById('save-btn');
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');
        const resultLink = document.getElementById('result-link');
        const shareUrlInput = document.getElementById('share-url');

        // Fungsi tambah kolom input baru saat tombol "+ Tambah Video Lagi" diklik
        addMoreBtn.addEventListener('click', () => {
            const newRow = document.createElement('div');
            newRow.className = 'flex gap-2 video-input-row';
            newRow.innerHTML = `
                <input type="url" placeholder="https://domain.com/video-berikutnya.mp4" 
                    class="w-full bg-gray-700 text-sm text-gray-100 p-2.5 rounded-lg border border-gray-600 focus:outline-none focus:border-blue-500 transition-colors url-input">
                <button type="button" onclick="this.parentElement.remove()" class="bg-red-900/40 hover:bg-red-900 text-red-400 p-2.5 rounded-lg border border-red-700/50 text-xs font-bold transition-all">Hapus</button>
            `;
            videoInputsContainer.appendChild(newRow);
        });

        function makeRandomSlug(length) {
            let result = '';
            const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            for (let i = 0; i < length; i++) {
                result += characters.charAt(Math.floor(Math.random() * characters.length));
            }
            return result;
        }

        saveBtn.addEventListener('click', async () => {
            const folderTitle = folderTitleInput.value.trim();
            
            // Mengambil semua value dari input link yang ada
            const inputElements = document.querySelectorAll('.url-input');
            const videoUrls = Array.from(inputElements).map(input => input.value.trim()).filter(url => url !== "");

            if (!folderTitle || videoUrls.length === 0) {
                return alert('Harap isi judul folder dan minimal satu link video!');
            }

            saveBtn.disabled = true;
            statusContainer.classList.remove('hidden');
            resultLink.classList.add('hidden');
            statusText.textContent = "Membuat folder koleksi...";

            try {
                const randomSlug = makeRandomSlug(6);

                // 1. Simpan data folder utama ke video_packages
                const { data: packageData, error: packageError } = await supabase
                    .from('video_packages')
                    .insert([{ title: folderTitle, slug: randomSlug }])
                    .select()
                    .single();

                if (packageError) throw packageError;

                statusText.textContent = `Menyimpan ${videoUrls.length} link video ke dalam folder...`;

                // 2. Siapkan data array untuk dimasukkan massal (bulk insert) ke video_items
                const itemsToInsert = videoUrls.map(url => ({
                    package_id: packageData.id,
                    video_url: url
                }));

                const { error: itemsError } = await supabase
                    .from('video_items')
                    .insert(itemsToInsert);

                if (itemsError) throw itemsError;

                statusText.textContent = "✓ Sukses membuat link folder!";
                statusText.className = "text-sm font-medium text-green-400";
                
                shareUrlInput.value = `${window.location.origin}/${randomSlug}`;
                resultLink.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                statusText.textContent = "❌ Error: " + error.message;
                statusText.className = "text-sm font-medium text-red-400";
            } finally {
                saveBtn.disabled = false;
            }
        });

        function copyLink() {
            shareUrlInput.select();
            document.execCommand('copy');
            alert('Link pendek berhasil disalin!');
        }
    </script>
</body>
</html>
