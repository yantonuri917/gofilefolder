<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <script type="text/javascript">
    (function(l) {
        if (l.search[1] === 'p') {
            var decoded = l.search.slice(1).split('&').map(function(s) {
                return s.replace(/~and~/g, '&')
            }).filter(function(v) {
                return v.indexOf('p=') === 0
            })[0];
            if (decoded) {
                var path = decoded.split('=')[1];
                if (path.charAt(0) === '/') {
                    path = path.slice(1);
                }
                var q = l.search.indexOf('&') !== -1 ? l.search.slice(l.search.indexOf('&')) : '';
                window.history.replaceState(null, null, l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/' + path + q + l.hash);
            }
        }
    }(window.location));
    </script>

    <meta name="referrer" content="no-referrer">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <title>Gofile - Folder View</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-200 min-h-screen flex flex-col items-center p-3 sm:p-6 pt-4" oncontextmenu="return false;">

    <div class="max-w-3xl w-full bg-[#111827] rounded-xl p-4 sm:p-5 shadow-2xl border border-gray-800/80 mt-2 overflow-hidden">
        
        <div class="border-b border-gray-800 pb-4 mb-4">
            <div class="flex items-start gap-3">
                <span class="text-3xl text-yellow-500 mt-1"><i class="fa-solid fa-folder"></i></span>
                <div class="min-w-0 flex-1">
                    <h2 id="folder-title-display" class="text-base font-bold text-gray-100 tracking-wide truncate">Memuat info folder...</h2>
                    <p id="folder-date" class="text-[11px] text-gray-500 mt-0.5">Menghubungkan...</p>
                    <div class="flex gap-2 mt-2">
                        <span class="text-[10px] bg-gray-800/80 text-emerald-400 px-2 py-0.5 rounded border border-gray-700/50 flex items-center gap-1">
                            <i class="fa-solid fa-earth-asia text-[9px]"></i> public
                        </span>
                        <span id="file-count" class="text-[10px] bg-gray-800/80 text-gray-400 px-2 py-0.5 rounded border border-gray-700/50">
                            0 items
                        </span>
                    </div>
                </div>
            </div>
        </div>

        <div id="files-feed-container" class="space-y-0 divide-y divide-gray-800/70">
            <div class="text-center py-12 text-xs text-yellow-500 animate-pulse">
                <i class="fa-solid fa-spinner fa-spin mr-1"></i> Memuat isi berkas Gofile...
            </div>
        </div>

        <div class="mt-8 pt-4 border-t border-gray-800 text-center text-[10px] text-gray-600 tracking-wide">
            Showing 1000 items per page • Total <span id="total-items-footer">0</span> items
        </div>
    </div>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = "https://ehhrvswzhirrnrqxmxae.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaHJ2c3d6aGlycm5ycXhteGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg2NDcsImV4cCI6MjA5NTgwNDY0N30.75vZs3Rn6j7YSlInHpGDN39OGjhywcEBv8j-hawyOlY";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const DOWNLOAD_REDIRECT_URL = "https://braverybreezebinding.com/dyu6kzr44?key=703bc4908bfdd21b148e4fe03f9810cb";

        // --- DETEKSI SLUG DENGAN AMAN UNTUK GITHUB PAGES ---
        const pathSegments = window.location.pathname.split('/').filter(Boolean);
        const videoSlug = pathSegments.pop();

        // DOM Elements
        const folderTitleDisplay = document.getElementById('folder-title-display');
        const folderDate = document.getElementById('folder-date');
        const filesFeedContainer = document.getElementById('files-feed-container');
        const fileCountSpan = document.getElementById('file-count');
        const totalItemsFooter = document.getElementById('total-items-footer');

        let videoUrlsCache = {};

        // Anti Inspect & F12 Basik
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'u')) {
                e.preventDefault();
                return false;
            }
        });

        // Fungsi Utama Fetch Data Feed Gofile
        async function loadGofileFeed() {
            // Validasi jika slug kosong atau mengarah ke index.html utama
            if (!videoSlug || videoSlug === "index.html") {
                folderTitleDisplay.textContent = "Error: Link Tidak Valid";
                filesFeedContainer.innerHTML = '<p class="text-red-400 text-xs text-center py-4">Silakan masukkan slug folder pada URL Anda. (Contoh: domain.com/slug-kamu)</p>';
                return;
            }

            try {
                // 1. Ambil data package berdasarkan slug
                const { data: packageData, error: packageError } = await supabaseClient
                    .from('video_packages')
                    .select('*')
                    .eq('slug', videoSlug)
                    .single();

                if (packageError || !packageData) {
                    folderTitleDisplay.textContent = "Folder Not Found";
                    filesFeedContainer.innerHTML = '<p class="text-red-400 text-xs text-center py-4">Sistem tidak menemukan folder tersebut.</p>';
                    return;
                }

                // Tampilkan Judul dan Tanggal Pembuatan Folder
                folderTitleDisplay.textContent = packageData.title;
                if (packageData.created_at) {
                    const dateObj = new Date(packageData.created_at);
                    folderDate.textContent = dateObj.toLocaleDateString('id-ID') + ', ' + dateObj.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                }

                // 2. Ambil semua item video di dalam package ini
                const { data: videoItems, error: itemsError } = await supabaseClient
                    .from('video_items')
                    .select('*')
                    .eq('package_id', packageData.id);

                if (itemsError || !videoItems || videoItems.length === 0) {
                    filesFeedContainer.innerHTML = '<p class="text-gray-500 text-xs text-center py-8">Folder kosong (Belum ada file diunggah).</p>';
                    return;
                }

                // Update Counter Data
                const totalItems = videoItems.length;
                fileCountSpan.textContent = totalItems + " items";
                totalItemsFooter.textContent = totalItems;
                filesFeedContainer.innerHTML = '';

                // Loop & Render Item Video
                videoItems.forEach((item, index) => {
                    videoUrlsCache[item.id] = item.video_url;

                    // Mengurai Nama File dari URL atau Default
                    let cleanUrl = item.video_url.split('#')[0];
                    let fileName = cleanUrl.split('/').pop().split('?')[0] || `Video_File_${index + 1}.mp4`;
                    if (item.video_url.includes('youtube.com') || item.video_url.includes('youtu.be')) {
                        fileName = `YouTube_Stream_Part_${index + 1}.mp4`;
                    }

                    // Estimasi Ukuran File Palsu & Total Download Acak
                    const fakeSize = ((index + 2) * 21.4).toFixed(1) + " MB";
                    const fakeDownloads = Math.floor(Math.random() * (50000 - 1000 + 1)) + 1000;

                    const rowDiv = document.createElement('div');
                    rowDiv.className = "py-4 flex flex-col w-full";

                    rowDiv.innerHTML = `
                        <div class="flex items-start justify-between w-full gap-3">
                            <div class="flex items-center gap-2 flex-shrink-0 mt-1">
                                <input type="checkbox" class="w-3.5 h-3.5 rounded bg-gray-900 border-gray-700 text-blue-600 focus:ring-0 cursor-pointer">
                                <span class="text-blue-500 text-base"><i class="fa-solid fa-file-video"></i></span>
                            </div>
                            <div class="flex-1 min-w-0 flex flex-col">
                                <div class="mb-3">
                                    <h3 class="text-xs font-semibold text-gray-200 tracking-wide break-all line-clamp-1">${fileName}</h3>
                                    <p class="text-[10px] text-gray-500 mt-0.5">${fakeSize}</p>
                                    <p class="text-[10px] text-gray-500">${fakeDownloads.toLocaleString('id-ID')} downloads</p>
                                </div>
                                <div id="mini-viewport-${item.id}" class="w-full max-w-[160px] sm:max-w-[180px] rounded bg-black border border-gray-800/60 flex items-center justify-center relative overflow-hidden cursor-pointer hover:opacity-90 transition-all duration-150" style="display: block;" onclick="handleThumbnailClick(event, '${item.id}')">
                                    ${renderThumbnailPlayer(item.video_url)}
                                </div>
                                <div id="expanded-zone-${item.id}" class="w-auto hidden mt-3 bg-black -mx-4 sm:-mx-5 border-y border-gray-800 aspect-video shadow-2xl"></div>
                            </div>
                            <div class="flex items-center gap-1.5 flex-shrink-0 mt-1">
                                <button type="button" id="play-btn-${item.id}" data-status="paused" onclick="handleButtonClick(event, '${item.id}')" class="w-8 h-8 rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700/80 flex items-center justify-center text-xs" title="Play Video">
                                    <i class="fa-solid fa-play"></i>
                                </button>
                                <a href="${DOWNLOAD_REDIRECT_URL}" target="_blank" class="w-8 h-8 rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700/80 flex items-center justify-center text-xs" title="Download">
                                    <i class="fa-solid fa-download"></i>
                                </a>
                                <button type="button" class="w-8 h-8 rounded bg-gray-800 hover:bg-gray-700 text-gray-400 border border-gray-700/80 flex items-center justify-center text-xs">
                                    <i class="fa-solid fa-ellipsis-vertical"></i>
                                </button>
                            </div>
                        </div>
                    `;

                    filesFeedContainer.appendChild(rowDiv);

                    // Block Iklan Native
                    if (index === 0) {
                        suntikIklanKontainer(filesFeedContainer, "container-93737c813e604544d6d8768c743712d8", "https://braverybreezebinding.com/93737c813e604544d6d8768c743712d8/invoke.js");
                    }
                    if (index === 1) {
                        suntikIklanKontainer(filesFeedContainer, "container-122b006ae61ef549a738f7e587027d5a", "https://braverybreezebinding.com/122b006ae61ef549a738f7e587027d5a/invoke.js");
                    }
                });

            } catch (err) {
                console.error(err);
                folderTitleDisplay.textContent = "Error Jaringan";
            }
        }

        function renderThumbnailPlayer(url) {
            if (url.match(/\.(mp4|webm|ogg)/i) || url.includes('supabase.co/storage')) {
                const cleanSrc = url.split('#')[0] + '#t=5';
                return `<video preload="metadata" muted playsinline class="w-full h-auto max-h-[240px] object-contain pointer-events-none select-none"><source src="${cleanSrc}" type="video/mp4"></video>`;
            } else if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let embedUrl = url.replace('watch?v=', 'embed/').replace('youtu.be/', 'youtube.com/embed/');
                return `<div class="w-full aspect-video"><iframe src="${embedUrl}" class="w-full h-full pointer-events-none opacity-50" frameborder="0"></iframe></div>`;
            }
            return `<div class="p-8"><i class="fa-solid fa-video text-gray-700 text-xl"></i></div>`;
        }

        // Handler Klik Mini Thumbnail untuk memicu Pemutaran Video
        function handleThumbnailClick(e, id) {
            e.preventDefault();
            e.stopPropagation();
            const playBtn = document.getElementById('play-btn-' + id);
            if (playBtn.getAttribute('data-status') !== 'playing') {
                playVideo(id);
            }
        }

        // Handler Tombol Play/Pause Samping File
        function handleButtonClick(e, id) {
            e.preventDefault();
            e.stopPropagation();
            const playBtn = document.getElementById('play-btn-' + id);
            if (playBtn.getAttribute('data-status') === 'playing') {
                closeVideo(id);
            } else {
                playVideo(id);
            }
        }

        function playVideo(id) {
            const playBtn = document.getElementById('play-btn-' + id);
            const miniViewport = document.getElementById('mini-viewport-' + id);
            const expandedZone = document.getElementById('expanded-zone-' + id);
            const rawUrl = videoUrlsCache[id];

            playBtn.setAttribute('data-status', 'playing');
            playBtn.innerHTML = '<i class="fa-solid fa-xmark text-sm"></i>';
            playBtn.className = 'w-8 h-8 rounded bg-red-600 hover:bg-red-700 text-white border border-red-500 flex items-center justify-center text-xs shadow-md';
            
            miniViewport.style.setProperty('display', 'none', 'important');
            expandedZone.classList.remove('hidden');

            if (rawUrl.match(/\.(mp4|webm|ogg)/i) || rawUrl.includes('supabase.co/storage')) {
                const cleanVideoUrl = rawUrl.split('#')[0];
                expandedZone.innerHTML = `<video controls autoplay playsinline controlsList="nodownload" oncontextmenu="return false;" class="w-full h-full object-contain select-none"><source src="${cleanVideoUrl}"></video>`;
            } else if (rawUrl.includes('youtube.com') || rawUrl.includes('youtu.be')) {
                let embedUrl = rawUrl.replace('watch?v=', 'embed/').replace('youtu.be/', 'youtube.com/embed/');
                embedUrl += embedUrl.includes('?') ? '&autoplay=1' : '?autoplay=1';
                expandedZone.innerHTML = `<div class="w-full aspect-video"><iframe src="${embedUrl}" class="w-full h-full" frameborder="0" allow="autoplay" allowfullscreen></iframe></div>`;
            } else {
                expandedZone.innerHTML = `<div class="w-full h-full flex flex-col items-center justify-center bg-gray-900 p-4"><p class="text-[11px] text-gray-400 mb-2">Pratinjau tidak didukung.</p><a href="${rawUrl}" target="_blank" class="bg-blue-600 text-white text-[10px] py-1.5 px-3 rounded font-bold">Buka Sumber</a></div>`;
            }

            setTimeout(() => {
                expandedZone.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 150);
        }

        function closeVideo(id) {
            const playBtn = document.getElementById('play-btn-' + id);
            const miniViewport = document.getElementById('mini-viewport-' + id);
            const expandedZone = document.getElementById('expanded-zone-' + id);

            expandedZone.innerHTML = '';
            expandedZone.classList.add('hidden');
            
            playBtn.setAttribute('data-status', 'paused');
            playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
            playBtn.className = 'w-8 h-8 rounded bg-gray-800 hover:bg-gray-700 text-gray-300 border border-gray-700/80 flex items-center justify-center text-xs';
            
            miniViewport.style.setProperty('display', 'block', 'important');
        }

        function suntikIklanKontainer(parent, containerId, scriptSrc) {
            var wadah = document.createElement('div');
            wadah.className = "py-4 flex justify-center border-b border-gray-800/40";
            var inner = document.createElement('div');
            inner.id = containerId;
            inner.className = "w-full flex items-center justify-center bg-transparent min-h-[100px]";
            var script = document.createElement('script');
            script.src = scriptSrc;
            script.async = true;
            script.dataset.cfasync = "false";
            wadah.appendChild(inner);
            wadah.appendChild(script);
            parent.appendChild(wadah);
        }

        loadGofileFeed();   
    </script>

    <script type="text/javascript">
        var _Hasync= _Hasync|| [];
        _Hasync.push(['Histats.start', '1,4971849,4,0,0,0,00010000']);
        _Hasync.push(['Histats.fasi', '1']);
        _Hasync.push(['Histats.track_hits', '']);
        (function() {
            var hs = document.createElement('script'); hs.type = 'text/javascript'; hs.async = true;
            hs.src = ('//s10.histats.com/js15_as.js');
            (document.head || document.body).appendChild(hs);
        })();
    </script>
</body>
