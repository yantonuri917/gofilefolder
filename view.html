<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofile - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #181f2f; color: #cbd5e1; font-family: system-ui, -apple-system, sans-serif; }
        .gofile-card { background-color: #1e293b; border-bottom: 1px solid #334155; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <div class="w-full max-w-2xl bg-[#1e293b] p-4 border-b border-slate-700 shadow-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <span class="text-2xl text-yellow-500"><i class="fa-solid fa-folder-open"></i></span>
            <div class="min-w-0 flex-1">
                <h2 id="folder-title-display" class="text-sm font-bold text-white truncate">Memuat info folder...</h2>
                <p id="folder-date" class="text-[10px] text-slate-400 mt-0.5">Loading...</p>
            </div>
            <div class="text-[10px] bg-[#1e293b] border border-slate-600 px-2 py-1 rounded text-emerald-400 font-semibold uppercase flex items-center gap-1">
                <i class="fa-solid fa-earth-asia"></i> public
            </div>
        </div>
    </div>

    <div class="w-full max-w-2xl px-4 py-2 bg-[#131a26] text-[11px] text-slate-400 flex justify-between border-b border-slate-800">
        <span id="file-count">0 items</span>
        <span>Showing 1000 items per page</span>
    </div>

    <div id="files-feed-container" class="w-full max-w-2xl flex flex-col">
        <div class="text-center py-12 text-xs text-yellow-500">
            <i class="fa-solid fa-spinner fa-spin mr-1"></i> Memuat daftar file...
        </div>
    </div>

    <div class="w-full max-w-2xl py-6 text-center text-[11px] text-slate-500">
        Total <span id="total-items-footer">0</span> items • Gofile Team © 2026
    </div>

    <script>
        const SUPABASE_URL = "https://ehhrvswzhirrnrqxmxae.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaHJ2c3d6aGlycm5ycXhteGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg2NDcsImV4cCI6MjA5NTgwNDY0N30.75vZs3Rn6j7YSlInHpGDN39OGjhywcEBv8j-hawyOlY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const videoSlug = urlParams.get('v'); 

        const folderTitleDisplay = document.getElementById('folder-title-display');
        const folderDate = document.getElementById('folder-date');
        const filesFeedContainer = document.getElementById('files-feed-container');
        const fileCountSpan = document.getElementById('file-count');
        const totalItemsFooter = document.getElementById('total-items-footer');

        async function loadGofileFeed() {
            if (!videoSlug) {
                folderTitleDisplay.textContent = "Error: Token Missing";
                filesFeedContainer.innerHTML = `<p class="text-red-400 text-xs text-center py-6">Parameter '?v=' tidak ditemukan.</p>`;
                return;
            }

            try {
                // 1. Ambil data induk dari tabel video_packages
                const { data: packageData, error: packageError } = await supabaseClient
                    .from('video_packages')
                    .select('*')
                    .eq('slug', videoSlug)
                    .single();

                if (packageError || !packageData) {
                    folderTitleDisplay.textContent = "Root Folder Empty";
                    filesFeedContainer.innerHTML = `<p class="text-slate-400 text-xs text-center py-6">Folder tidak valid atau telah dihapus.</p>`;
                    return;
                }

                folderTitleDisplay.textContent = packageData.title;
                if (packageData.created_at) {
                    const tgl = new Date(packageData.created_at);
                    folderDate.textContent = `${tgl.toLocaleDateString('id-ID')}, ${tgl.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}`;
                }

                // 2. Ambil seluruh daftar video terkait di video_items
                const { data: itemsData, error: itemsError } = await supabaseClient
                    .from('video_items')
                    .select('*')
                    .eq('package_id', packageData.id);

                if (itemsError || !itemsData || itemsData.length === 0) {
                    filesFeedContainer.innerHTML = `<p class="text-slate-500 text-xs text-center py-12">Tidak ada file dalam direktori ini.</p>`;
                    return;
                }

                fileCountSpan.textContent = `${itemsData.length} items`;
                totalItemsFooter.textContent = itemsData.length;
                filesFeedContainer.innerHTML = "";

                // Bangun baris item per file dengan struktur 100% mirip Gofile Asli
                itemsData.forEach((item, index) => {
                    const fullUrl = item.video_url;
                    
                    let fileName = fullUrl.split('/').pop().split('?')[0] || `File_Video_${index + 1}.mp4`;
                    if (fullUrl.includes('youtube.com') || fullUrl.includes('youtu.be')) {
                        fileName = `YouTube_Stream_${index + 1}.mp4`;
                    }

                    // Generator tanggal & angka tiruan agar terlihat persis seperti screenshot asli Anda
                    const fakeSize = ((index + 1) * 31.4 + 32.5).toFixed(1) + " MB";
                    const fakeDownloads = Math.floor(Math.random() * 5000) + 12;

                    const row = document.createElement('div');
                    row.className = "gofile-card p-4 flex flex-col gap-3";

                    row.innerHTML = `
                        <div class="flex items-start justify-between gap-4">
                            <div class="min-w-0 flex-1">
                                <h3 class="text-xs font-bold text-slate-200 tracking-wide break-all">${fileName}</h3>
                                <p class="text-[10px] text-slate-500 mt-1">${fakeSize} • ${fakeDownloads} downloads</p>
                            </div>
                        </div>

                        <div class="flex items-start gap-4">
                            <div id="media-wrapper-${item.id}" class="w-[110px] h-[110px] rounded bg-slate-950 flex-shrink-0 border border-slate-800 flex items-center justify-center relative overflow-hidden transition-all duration-300">
                                <div class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/40 text-blue-400 text-2xl">
                                    <i class="fa-solid fa-file-video"></i>
                                </div>
                            </div>

                            <div class="flex items-center gap-1.5 mt-2">
                                <button onclick="expandAndPlay('${item.id}', '${fullUrl}')" class="w-8 h-8 rounded bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700/60 flex items-center justify-center text-xs" title="Play Video">
                                    <i class="fa-solid fa-play"></i>
                                </button>
                                <a href="${fullUrl}" target="_blank" class="w-8 h-8 rounded bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700/60 flex items-center justify-center text-xs" title="Download">
                                    <i class="fa-solid fa-download"></i>
                                </a>
                                <button class="w-8 h-8 rounded bg-slate-800 hover:bg-slate-700 text-slate-300 border border-slate-700/60 flex items-center justify-center text-xs">
                                    <i class="fa-solid fa-ellipsis-vertical"></i>
                                </button>
                            </div>
                        </div>
                    `;

                    filesFeedContainer.appendChild(row);
                });

            } catch (err) {
                console.error(err);
                folderTitleDisplay.textContent = "Error Terhubung";
            }
        }

        // FUNGSI INTI: Membuka kotak thumbnail menjadi pemutar video yang melar membesar secara fleksibel
        function expandAndPlay(id, url) {
            const container = document.getElementById(`media-wrapper-${id}`);
            
            // Ubah class ukuran kotak dari 110px kotak kecil, menjadi lebar penuh (w-full) dan tinggi bebas otomatis (h-auto)
            container.classList.remove('w-[110px]', 'h-[110px]');
            container.classList.add('w-full', 'h-auto', 'aspect-video', 'mt-1');

            // Masukkan elemen pemutar asli ke dalamnya agar langsung berputar di halaman
            if (url.match(/\.(mp4|webm|ogg)/i) || url.includes('supabase.co/storage')) {
                container.innerHTML = `<video controls autoplay class="w-full h-full object-contain"><source src="${url}" type="video/mp4"></video>`;
            } else if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let embedUrl = url;
                if(embedUrl.includes('watch?v=')) embedUrl = embedUrl.replace('watch?v=', 'embed/');
                if(embedUrl.includes('youtu.be/')) embedUrl = embedUrl.replace('youtu.be/', 'youtube.com/embed/');
                embedUrl += embedUrl.includes('?') ? "&autoplay=1" : "?autoplay=1";
                
                container.innerHTML = `<iframe src="${embedUrl}" class="w-full h-full" frameborder="0" allow="autoplay" allowfullscreen></iframe>`;
            } else {
                container.innerHTML = `
                    <div class="p-4 text-center bg-slate-900 w-full h-full flex flex-col items-center justify-center gap-2">
                        <p class="text-[10px] text-slate-400">Link Eksternal Terdeteksi</p>
                        <a href="${url}" target="_blank" class="bg-blue-600 px-3 py-1 rounded text-[10px] text-white font-bold">Buka Sumber Ex</a>
                    </div>`;
            }
        }

        loadGofileFeed();
    </script>
</body>
</html>
