<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofile - Folder Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #181f2f; color: #cbd5e1; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        .gofile-card { border-bottom: 1px solid #1f2937; padding-bottom: 16px; padding-top: 16px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center px-4">

    <div class="w-full max-w-xl mt-4 bg-[#1e293b]/40 p-4 rounded-xl border border-gray-800 flex flex-col gap-1">
        <div class="flex items-center gap-2">
            <span class="text-xl text-yellow-500"><i class="fa-solid fa-folder"></i></span>
            <h2 id="folder-title-display" class="text-sm font-bold text-gray-200 truncate">Menghubungkan ke folder...</h2>
        </div>
        <p id="folder-date" class="text-[10px] text-gray-500 pl-7">Sinkronisasi database...</p>
        <div class="flex gap-2 mt-1 pl-7">
            <span class="text-[9px] bg-gray-800 text-emerald-400 px-1.5 py-0.5 rounded border border-gray-700 flex items-center gap-1">
                <i class="fa-solid fa-earth-asia"></i> public
            </span>
            <span id="file-count" class="text-[9px] bg-gray-800 text-gray-400 px-1.5 py-0.5 rounded border border-gray-700">
                0 items
            </span>
        </div>
    </div>

    <div id="files-feed-container" class="w-full max-w-xl flex flex-col mt-2">
        <div id="loading-state" class="text-center py-12 text-xs text-yellow-500">
            <i class="fa-solid fa-spinner fa-spin mr-1"></i> Memuat berkas dari tabel videos_list...
        </div>
    </div>

    <div class="w-full max-w-xl py-6 text-center text-[10px] text-gray-600">
        Showing 1000 items per page • Total <span id="total-items-footer">0</span> items
    </div>

    <script>
        // Kredensial Supabase Anda
        const SUPABASE_URL = "https://ehhrvswzhirrnrqxmxae.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaHJ2c3d6aGlycm5ycXhteGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg2NDcsImV4cCI6MjA5NTgwNDY0N30.75vZs3Rn6j7YSlInHpGDN39OGjhywcEBv8j-hawyOlY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const videoSlug = urlParams.get('v'); 

        const folderTitleDisplay = document.getElementById('folder-title-display');
        const folderDate = document.getElementById('folder-date');
        const filesFeedContainer = document.getElementById('files-feed-container');
        const fileCountSpan = document.getElementById('file-count');
        const totalItemsFooter = document.getElementById('total-items-footer');

        let videoDataMap = {};

        async function fetchGofileData() {
            if (!videoSlug) {
                filesFeedContainer.innerHTML = `<p class="text-red-400 text-xs text-center py-4">Error: ID Folder (?v=) kosong.</p>`;
                return;
            }

            try {
                // 1. Dapatkan kecocokan ID Paket berdasarkan slug dari tabel video_packages
                const { data: packageData, error: packageError } = await supabaseClient
                    .from('video_packages')
                    .select('*')
                    .eq('slug', videoSlug)
                    .single();

                if (packageError || !packageData) {
                    folderTitleDisplay.textContent = "Folder Tidak Ditemukan";
                    filesFeedContainer.innerHTML = `<p class="text-gray-500 text-xs text-center py-4">Periksa kembali token URL Anda.</p>`;
                    return;
                }

                folderTitleDisplay.textContent = packageData.title;
                const dateObj = packageData.created_at ? new Date(packageData.created_at) : new Date();
                folderDate.textContent = `${dateObj.toLocaleDateString('id-ID')} ${dateObj.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})}`;

                // FIX UTAMA: Menarik data langsung dari tabel database Anda yang bernama "videos_list"
                const { data: itemsData, error: itemsError } = await supabaseClient
                    .from('videos_list')
                    .select('*')
                    .eq('package_id', packageData.id);

                if (itemsError) {
                    console.error("SQL Error:", itemsError);
                    filesFeedContainer.innerHTML = `<p class="text-red-400 text-xs text-center py-4">Gagal membaca data tabel videos_list.</p>`;
                    return;
                }

                if (!itemsData || itemsData.length === 0) {
                    filesFeedContainer.innerHTML = `<p class="text-gray-500 text-xs text-center py-8">Folder ini kosong (0 berkas ditemukan).</p>`;
                    return;
                }

                fileCountSpan.textContent = `${itemsData.length} items`;
                totalItemsFooter.textContent = itemsData.length;
                filesFeedContainer.innerHTML = ""; 

                // Tampilkan struktur perulangan baris file murni gaya Gofile
                itemsData.forEach((item, index) => {
                    // Deteksi nama kolom URL dinamis agar toleran jika nama kolomnya 'url' atau 'video_url'
                    const fullUrl = item.video_url || item.url || "#";
                    videoDataMap[item.id] = fullUrl;

                    let fileName = "Video_File_Gofile.mp4";
                    if (fullUrl && fullUrl !== "#") {
                        fileName = fullUrl.split('/').pop().split('?')[0] || `File_Video_${index + 1}.mp4`;
                    }

                    // Rumus generator berat data & hitungan unduhan palsu agar mirip tangkapan layar asli
                    const fakeSize = ((index + 1) * 28.5 + 41.2).toFixed(1) + " MB";
                    const fakeDownloads = Math.floor(Math.random() * 800) + 1;

                    const card = document.createElement('div');
                    card.className = "gofile-card flex flex-col";

                    card.innerHTML = `
                        <div class="w-full mb-2 pl-7">
                            <h3 class="text-xs font-semibold text-gray-200 tracking-wide break-all">${fileName}</h3>
                            <p class="text-[9px] text-gray-500 mt-0.5">${dateObj.toLocaleDateString('id-ID')} • ${fakeSize} • ${fakeDownloads} downloads</p>
                        </div>

                        <div class="flex items-center justify-between w-full gap-2">
                            <div class="flex items-center gap-2">
                                <input type="checkbox" class="w-3 h-3 rounded bg-gray-900 border-gray-700 text-blue-600 focus:ring-0">
                                <span class="text-blue-500 text-sm"><i class="fa-solid fa-file-video"></i></span>
                            </div>

                            <div id="media-viewport-${item.id}" class="w-[110px] h-[110px] rounded bg-gray-950 border border-gray-800/80 flex items-center justify-center relative overflow-hidden mx-auto">
                                <div class="absolute inset-0 flex items-center justify-center bg-gray-900/30">
                                    <i class="fa-solid fa-video text-gray-700 text-sm"></i>
                                </div>
                            </div>

                            <div class="flex items-center gap-1 flex-shrink-0">
                                <button id="play-btn-${item.id}" onclick="togglePlayGofile('${item.id}')" class="w-7 h-7 rounded bg-[#1e293b] hover:bg-gray-700 text-gray-300 border border-gray-700 flex items-center justify-center text-[10px]" title="Play">
                                    <i class="fa-solid fa-play"></i>
                                </button>
                                <a href="${fullUrl}" target="_blank" class="w-7 h-7 rounded bg-[#1e293b] hover:bg-gray-700 text-gray-300 border border-gray-700 flex items-center justify-center text-[10px]" title="Download">
                                    <i class="fa-solid fa-download"></i>
                                </a>
                                <button class="w-7 h-7 rounded bg-[#1e293b] text-gray-400 border border-gray-700 flex items-center justify-center text-[10px]">
                                    <i class="fa-solid fa-ellipsis-vertical"></i>
                                </button>
                            </div>
                        </div>

                        <div id="expanded-player-zone-${item.id}" class="w-full hidden mt-3 bg-black rounded-lg overflow-hidden border border-gray-900 aspect-video"></div>
                    `;

                    filesFeedContainer.appendChild(card);
                });

            } catch (err) {
                console.error("Crash:", err);
                filesFeedContainer.innerHTML = `<p class="text-red-400 text-xs text-center py-4">Gagal memproses skrip database.</p>`;
            }
        }

        // FUNGSI TRANSISI: Menyembunyikan box kecil dan membuka video ukuran penuh ke bawah
        function togglePlayGofile(id) {
            const btn = document.getElementById(`play-btn-${id}`);
            const miniBox = document.getElementById(`media-viewport-${id}`);
            const bigPlayerZone = document.getElementById(`expanded-player-zone-${id}`);
            const fileUrl = videoDataMap[id];

            // Jika status sedang berputar -> Klik untuk Menutup / Mengembalikan ukuran awal
            if (btn.classList.contains('isPlaying')) {
                btn.classList.remove('isPlaying');
                btn.innerHTML = `<i class="fa-solid fa-play"></i>`; // Ganti balik ke icon Play segitiga
                btn.className = "w-7 h-7 rounded bg-[#1e293b] text-gray-300 border border-gray-700 flex items-center justify-center text-[10px]";

                miniBox.classList.remove('hidden'); // Memunculkan kembali kotak kecil di tengah
                bigPlayerZone.classList.add('hidden'); // Menutupi layar video besar bawah
                bigPlayerZone.innerHTML = ""; // Bersihkan memori player agar suara video mati
            } 
            // Jika status mati -> Klik untuk Melebarkan Layar Full Kebawah
            else {
                btn.classList.add('isPlaying');
                btn.innerHTML = `<i class="fa-solid fa-xmark"></i>`; // Ganti icon tombol menjadi Tanda Silang (X)
                btn.className = "w-7 h-7 rounded bg-gray-700 text-white border border-gray-500 flex items-center justify-center text-[10px]";

                miniBox.classList.add('hidden'); // Sembunyikan kotak pratinjau kecil tengah
                bigPlayerZone.classList.remove('hidden'); // Aktifkan wadah area bawah lebar penuh

                // Menyuntikkan tag player video orisinal ke dalam halaman secara instan
                if (fileUrl.match(/\.(mp4|webm|ogg)/i) || fileUrl.includes('supabase.co/storage')) {
                    bigPlayerZone.innerHTML = `<video controls autoplay class="w-full h-full object-contain"><source src="${fileUrl}" type="video/mp4"></video>`;
                } else if (fileUrl.includes('youtube.com') || fileUrl.includes('youtu.be')) {
                    let embed = fileUrl;
                    if(embed.includes('watch?v=')) embed = embed.replace('watch?v=', 'embed/');
                    if(embed.includes('youtu.be/')) embed = embed.replace('youtu.be/', 'youtube.com/embed/');
                    embed += embed.includes('?') ? "&autoplay=1" : "?autoplay=1";
                    bigPlayerZone.innerHTML = `<iframe src="${embed}" class="w-full h-full" frameborder="0" allow="autoplay" allowfullscreen></iframe>`;
                } else {
                    bigPlayerZone.innerHTML = `
                        <div class="w-full h-full flex flex-col items-center justify-center bg-gray-900 p-4 text-center">
                            <p class="text-[10px] text-gray-400 mb-2">Eksternal Cloud Stream</p>
                            <a href="${fileUrl}" target="_blank" class="bg-blue-600 text-white text-[10px] py-1 px-3 rounded font-bold">Buka Link Sumber</a>
                        </div>`;
                }
            }
        }

        // Jalankan perintah muat
        fetchGofileData();
    </script>
</body>
</html>
