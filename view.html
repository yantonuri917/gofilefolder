<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofile - Multi Player View</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center p-4 md:p-8">

    <div class="max-w-4xl w-full bg-gray-800 rounded-xl p-6 shadow-2xl border border-gray-700">
        <div class="flex items-center justify-between border-b border-gray-700 pb-4 mb-4">
            <h1 class="text-xl font-bold text-blue-400 tracking-wide">📁 Gofile <span class="text-xs text-gray-500 font-normal ml-2">Multi-Upload</span></h1>
            <span id="folder-date" class="text-xs text-gray-400">Loading...</span>
        </div>

        <h2 id="folder-title-display" class="text-2xl font-bold mb-6 text-white">Memuat info folder...</h2>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="lg:col-span-2 space-y-4">
                <div id="player-container" class="w-full aspect-video bg-black rounded-lg overflow-hidden flex items-center justify-center border border-gray-700 shadow-inner">
                    <p id="player-status" class="text-gray-400 text-sm">Pilih salah satu video di daftar untuk mulai memutar</p>
                </div>
                <div class="flex justify-between items-center bg-gray-700/30 p-3 rounded-lg border border-gray-700">
                    <span class="text-xs font-semibold text-gray-400 uppercase">Sedang diputar:</span>
                    <a id="direct-download-btn" href="#" target="_blank" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-1.5 px-4 rounded-md text-xs transition-all shadow-md">
                        🔗 Sumber Video / Download
                    </a>
                </div>
            </div>

            <div class="bg-gray-950 p-4 rounded-lg border border-gray-700 flex flex-col h-[300px] lg:h-auto">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Daftar File Video (${count})</h3>
                <div id="playlist-container" class="space-y-2 overflow-y-auto flex-1 pr-1">
                    <p class="text-xs text-yellow-500 animate-pulse">Memuat daftar...</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://ehhrvswzhirrnrqxmxae.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaHJ2c3d6aGlycm5ycXhteGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg2NDcsImV4cCI6MjA5NTgwNDY0N30.75vZs3Rn6j7YSlInHpGDN39OGjhywcEBv8j-hawyOlY";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const videoSlug = urlParams.get('v'); 

        const folderTitleDisplay = document.getElementById('folder-title-display');
        const folderDate = document.getElementById('folder-date');
        const playerContainer = document.getElementById('player-container');
        const playerStatus = document.getElementById('player-status');
        const playlistContainer = document.getElementById('playlist-container');
        const directDownloadBtn = document.getElementById('direct-download-btn');

        async function loadFolderData() {
            if (!videoSlug) {
                folderTitleDisplay.textContent = "Error 404";
                playlistContainer.innerHTML = `<p class="text-red-400 text-xs">Slug kosong.</p>`;
                return;
            }

            try {
                // 1. Ambil data folder utamanya dulu berdasarkan slug
                const { data: folder, error: folderError } = await supabase
                    .from('video_packages')
                    .select('*')
                    .eq('slug', videoSlug)
                    .single();

                if (folderError || !folder) throw new Error();

                folderTitleDisplay.textContent = folder.title;
                folderDate.textContent = `Dibuat: ${new Date(folder.created_at).toLocaleDateString('id-ID')}`;

                // 2. Ambil semua list video item yang berelasi dengan folder ini
                const { data: videos, error: videosError } = await supabase
                    .from('video_items')
                    .select('*')
                    .eq('package_id', folder.id)
                    .order('created_at', { ascending: true });

                if (videosError || !videos || videos.length === 0) {
                    playlistContainer.innerHTML = `<p class="text-gray-500 text-xs">Folder ini kosong.</p>`;
                    return;
                }

                // Render item-item video ke daftar playlist sebelah kanan
                playlistContainer.innerHTML = "";
                videos.forEach((video, index) => {
                    // Mencoba membersihkan penamaan tampilan biar ga kepanjangan text url nya
                    let displayName = video.video_url.split('/').pop().substring(0, 30) || `Video Part ${index + 1}`;
                    if (video.video_url.includes('youtube.com') || video.video_url.includes('youtu.be')) {
                        displayName = `📺 YouTube Video - Part ${index + 1}`;
                    }

                    const btn = document.createElement('button');
                    btn.className = "w-full text-left bg-gray-800 hover:bg-gray-700 text-gray-300 p-2.5 rounded border border-gray-700/50 text-xs font-medium transition-all block truncate text-ellipsis";
                    btn.textContent = `${index + 1}. ${displayName}`;
                    
                    // Event ketika baris list video tersebut diklik oleh penonton
                    btn.onclick = () => playVideo(video.video_url);
                    
                    playlistContainer.appendChild(btn);
                });

                // Putar video pertama secara otomatis di awal load halaman
                playVideo(videos[0].video_url);

            } catch (err) {
                folderTitleDisplay.textContent = "Folder Tidak Ditemukan";
                playlistContainer.innerHTML = `<p class="text-red-400 text-xs">Link salah atau terhapus.</p>`;
                playerStatus.textContent = "Gagal memuat playlist.";
            }
        }

        // Fungsi penangan pergantian player video
        function playVideo(url) {
            directDownloadBtn.href = url;
            directDownloadBtn.classList.remove('hidden');

            if (url.match(/\.(mp4|webm|ogg)/i) || url.includes('supabase.co/storage')) {
                playerContainer.innerHTML = `<video controls autoplay class="w-full h-full object-contain"><source src="${url}" type="video/mp4"></video>`;
            } else if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let embedUrl = url;
                if(embedUrl.includes('watch?v=')) embedUrl = embedUrl.replace('watch?v=', 'embed/');
                if(embedUrl.includes('youtu.be/')) embedUrl = embedUrl.replace('youtu.be/', 'youtube.com/embed/');
                // Tambahkan autoplay parameter bawaan iframe youtube
                if(!embedUrl.includes('?')) embedUrl += "?autoplay=1";
                else embedUrl += "&autoplay=1";
                
                playerContainer.innerHTML = `<iframe src="${embedUrl}" class="w-full h-full" allow="autoplay" allowfullscreen frameborder="0"></iframe>`;
            } else {
                playerContainer.innerHTML = `
                    <div class="text-center p-4">
                        <p class="text-xs text-gray-400 mb-2">Format direct player tidak didukung. Silakan klik tombol download.</p>
                        <p class="text-xs text-blue-400 font-mono break-all max-w-xs">${url}</p>
                    </div>
                `;
            }
        }

        loadFolderData();
    </script>
</body>
</html>
