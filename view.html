<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gofile - Multi View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center p-4">

    <div class="max-w-4xl w-full bg-gray-800 rounded-xl p-5 shadow-2xl border border-gray-700 mt-4">
        <div class="flex items-center justify-between border-b border-gray-700 pb-3 mb-3">
            <h1 class="text-xl font-bold text-blue-400">📁 Gofile <span class="text-xs text-gray-500 font-normal">Clone</span></h1>
            <span id="folder-date" class="text-xs text-gray-400">Loading...</span>
        </div>

        <h2 id="folder-title-display" class="text-xl font-bold mb-4 text-white">Memuat info koleksi...</h2>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            
            <div class="lg:col-span-2 space-y-3">
                <div id="player-container" class="w-full aspect-video bg-black rounded-lg overflow-hidden flex items-center justify-center border border-gray-700">
                    <p id="player-status" class="text-gray-400 text-sm">Pilih video di bawah untuk memutar</p>
                </div>
                <div class="flex justify-between items-center bg-gray-700/30 p-2 rounded-lg border border-gray-700">
                    <span class="text-[10px] font-semibold text-gray-400 uppercase">Aksi:</span>
                    <a id="direct-download-btn" href="#" target="_blank" class="hidden bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-1 px-3 rounded text-xs">
                        🔗 Link Sumber / Download
                    </a>
                </div>
            </div>

            <div class="bg-gray-950 p-3 rounded-lg border border-gray-700 flex flex-col h-[250px] lg:h-auto">
                <h3 class="text-xs font-bold text-gray-400 uppercase mb-2">Daftar Putar Video</h3>
                <div id="playlist-container" class="space-y-1.5 overflow-y-auto flex-1">
                    <p class="text-xs text-yellow-500">Memuat playlist...</p>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Inisialisasi Supabase
        const SUPABASE_URL = "https://ehhrvswzhirrnrqxmxae.supabase.co"; 
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVoaHJ2c3d6aGlycm5ycXhteGFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjg2NDcsImV4cCI6MjA5NTgwNDY0N30.75vZs3Rn6j7YSlInHpGDN39OGjhywcEBv8j-hawyOlY";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Ambil ID slug (?v=xxxxxx) dari URL browser HP
        const urlParams = new URLSearchParams(window.location.search);
        const videoSlug = urlParams.get('v'); 

        const folderTitleDisplay = document.getElementById('folder-title-display');
        const folderDate = document.getElementById('folder-date');
        const playerContainer = document.getElementById('player-container');
        const playlistContainer = document.getElementById('playlist-container');
        const directDownloadBtn = document.getElementById('direct-download-btn');

        async function loadDataKoleksi() {
            if (!videoSlug) {
                folderTitleDisplay.textContent = "Error: Link Tidak Valid";
                playlistContainer.innerHTML = `<p class="text-red-400 text-xs">Parameter 'v' kosong.</p>`;
                return;
            }

            try {
                // 1. Cari info folder utama di video_packages berdasarkan slug
                const { data: packageData, error: packageError } = await supabaseClient
                    .from('video_packages')
                    .select('*')
                    .eq('slug', videoSlug)
                    .single();

                if (packageError || !packageData) {
                    folderTitleDisplay.textContent = "Folder Tidak Ditemukan";
                    playlistContainer.innerHTML = `<p class="text-red-400 text-xs">Koleksi ini tidak ada di database.</p>`;
                    return;
                }

                // Tampilkan judul dan tanggal pembuatan folder
                folderTitleDisplay.textContent = packageData.title;
                if (packageData.created_at) {
                    folderDate.textContent = `Dibuat: ${new Date(packageData.created_at).toLocaleDateString('id-ID')}`;
                }

                // 2. Cari semua video di video_items yang memiliki relasi package_id
                const { data: itemsData, error: itemsError } = await supabaseClient
                    .from('video_items')
                    .select('*')
                    .eq('package_id', packageData.id);

                if (itemsError || !itemsData || itemsData.length === 0) {
                    playlistContainer.innerHTML = `<p class="text-gray-500 text-xs">Folder kosong (tidak ada video).</p>`;
                    return;
                }

                // Bersihkan tulisan loading dan susun daftar playlist video
                playlistContainer.innerHTML = "";
                itemsData.forEach((item, index) => {
                    // Buat potongan nama file singkat sebagai judul tombol
                    let displayName = item.video_url.split('/').pop().substring(0, 20) || `Video ${index + 1}`;
                    if (item.video_url.includes('youtube.com') || item.video_url.includes('youtu.be')) {
                        displayName = `📺 YouTube Part ${index + 1}`;
                    }

                    const btn = document.createElement('button');
                    btn.className = "w-full text-left bg-gray-800 hover:bg-gray-700 text-gray-300 p-2.5 rounded border border-gray-700 text-xs block truncate transition-all mb-1";
                    btn.textContent = `${index + 1}. ${displayName}`;
                    
                    // Fungsi ketika salah satu playlist diklik di HP
                    btn.onclick = () => playVideo(item.video_url);
                    playlistContainer.appendChild(btn);
                });

                // Jalankan otomatis video pertama pada list
                playVideo(itemsData[0].video_url);

            } catch (err) {
                console.error(err);
                folderTitleDisplay.textContent = "Gagal Memuat";
                playlistContainer.innerHTML = `<p class="text-red-400 text-xs">Terjadi kesalahan jaringan.</p>`;
            }
        }

        function playVideo(url) {
            directDownloadBtn.href = url;
            directDownloadBtn.classList.remove('hidden');

            // Cek tipe video (MP4/WebM atau Link langsung)
            if (url.match(/\.(mp4|webm|ogg)/i) || url.includes('supabase.co/storage')) {
                playerContainer.innerHTML = `<video controls autoplay class="w-full h-full object-contain"><source src="${url}" type="video/mp4"></video>`;
            } else if (url.includes('youtube.com') || url.includes('youtu.be')) {
                let embedUrl = url;
                if(embedUrl.includes('watch?v=')) embedUrl = embedUrl.replace('watch?v=', 'embed/');
                if(embedUrl.includes('youtu.be/')) embedUrl = embedUrl.replace('youtu.be/', 'youtube.com/embed/');
                
                // Tambahkan fitur autoplay agar langsung berputar otomatis saat di-klik
                embedUrl += embedUrl.includes('?') ? "&autoplay=1" : "?autoplay=1";
                playerContainer.innerHTML = `<iframe src="${embedUrl}" class="w-full h-full" allow="autoplay" allowfullscreen frameborder="0"></iframe>`;
            } else {
                // Cadangan jika link berupa pemutar pihak ketiga (Doodstream, Terabox, dll)
                playerContainer.innerHTML = `
                    <div class="text-center p-4">
                        <p class="text-xs text-gray-400 mb-2">Video eksternal terdeteksi.</p>
                        <a href="${url}" target="_blank" class="bg-blue-600 px-3 py-1.5 rounded font-bold text-xs inline-block text-white">Buka Pemutar Eksternal ↗</a>
                    </div>`;
            }
        }

        // Eksekusi fungsi pembacaan data saat halaman terbuka
        loadDataKoleksi();
    </script>
</body>
</html>
